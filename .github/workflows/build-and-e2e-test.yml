name: Docker Build and E2E Tests

on:
  push:
    branches:
      - main
      - dev # disable temporarily

jobs:
  integration_test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Add e2e env file
        run: |
          cat > .env.e2e <<HEREDOCS
          ${{ vars.TEST_DOT_ENV }}
          ${{ vars.TEST_PLAYWRIGHT_ENV }}
          HEREDOCS

      - name: Start isolated e2e stack
        run: npm run test:e2e:stack:up

      - name: Install Dependencies
        run: npm install

      - name: Install playwright tests
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Clean up databases
        if: always()
        run: npm run test:e2e:stack:down

      - name: Fail workflow if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1

  build_and_push:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Increase timeout for the build job
    needs: integration_test

    strategy:
      matrix:
        service: ['web-app', 'server']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set date and git sha
        id: vars
        run: |
          echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          BRANCH_OR_TAG: ${{ github.base_ref || github.ref_name }}
        with:
          context: .
          file: docker/Dockerfile-${{ matrix.service }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ env.DATE }}-${{ env.GIT_SHA }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ env.BRANCH_OR_TAG }}
          build-args: |
            NPM_CONFIG_REGISTRY=https://registry.npmjs.org/
            NPM_CONFIG_FETCH_RETRIES=5
            NPM_CONFIG_FETCH_RETRY_FACTOR=2
            NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=15000
            NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=120000
            NPM_CONFIG_TIMEOUT=300000
          network: host
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false
          pull: true
