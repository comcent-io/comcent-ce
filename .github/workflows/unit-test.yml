name: Unit test
on:
  push:
    branches:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Linux Rollup binary
        run: npm install @rollup/rollup-linux-x64-gnu

      - name: Run unit tests
        run: npm run test
