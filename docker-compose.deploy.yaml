# Comcent CE — deployment docker-compose.
#
# For OSS self-hosters. One domain fronts server (API), web-app, and
# the SIP WebSocket. Raw SIP and RTP media ports sit outside Traefik
# (different protocol).
#
# Quick start:
#   mkdir comcent-ce && cd comcent-ce
#   curl -O https://raw.githubusercontent.com/comcent-io/comcent-ce/main/docker-compose.deploy.yaml
#   curl -O https://raw.githubusercontent.com/comcent-io/comcent-ce/main/.env.deploy.example
#   mv .env.deploy.example .env
#   # edit .env — set COMCENT_DOMAIN, LETSENCRYPT_EMAIL, DATABASE/REDIS/RABBITMQ passwords,
#   # DEEPGRAM_API_KEY, OPENAI_API_KEY, AWS storage creds
#   docker compose -f docker-compose.deploy.yaml up -d
#   docker compose -f docker-compose.deploy.yaml logs -f server
#
# Requirements on the host:
#   - Public DNS A record: ${COMCENT_DOMAIN} -> your droplet IP
#   - Inbound ports open: 80, 443 (HTTP/HTTPS), 5060 UDP/TCP (SIP),
#     19000-19100 UDP (RTP media)
#   - Docker 24+ and docker compose plugin
#
# All persistent data lives in named volumes (postgres_data, etc.).
# Back these up on your schedule.

services:
  # ---------------------------------------------------------------------------
  # Reverse proxy — terminates TLS, routes to server/web-app, ACME for certs
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    # Why no docker provider: Docker Engine ≥25 enforces a minimum API
    # version of 1.40, but Traefik's docker provider hard-codes the legacy
    # 1.24 client and ignores DOCKER_API_VERSION. The daemon refuses every
    # call → no routers, no Let's Encrypt cert. Routes are static here, so
    # we use the file provider instead and avoid the docker socket entirely.
    command:
      - --api.dashboard=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Force HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      # Let's Encrypt HTTP-01 challenge
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --accesslog=true
      - --log.level=INFO
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - traefik_letsencrypt:/letsencrypt
    configs:
      # Inline dynamic config — ${COMCENT_DOMAIN} is interpolated by docker
      # compose itself when the config is written, so the Host(`…`) match
      # ends up correct for the operator's domain without templating.
      - source: traefik-dynamic
        target: /etc/traefik/dynamic.yml
    networks:
      - comcent-network

  # ---------------------------------------------------------------------------
  # Data services
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comcent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-comcent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${POSTGRES_USER:-comcent}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - comcent-network

  redis:
    image: redis:7.4.1
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - comcent-network

  rabbitmq:
    image: rabbitmq:3.12.2-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-comcent}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - comcent-network

  # ---------------------------------------------------------------------------
  # Comcent Elixir API server
  # ---------------------------------------------------------------------------
  server:
    image: ghcr.io/comcent-io/comcent-ce-server:${COMCENT_VERSION:-latest}
    # Fallback to local build if image not yet published to GHCR:
    build:
      context: .
      dockerfile: docker/Dockerfile-server
    restart: unless-stopped
    # Run schema migrations before starting the Phoenix server. Idempotent —
    # already-applied migrations are skipped — so it's safe on every restart.
    command: sh -c "/app/bin/migrate && /app/bin/server start"
    env_file: .env
    environment:
      # Single source of truth — runtime.exs derives PHX_HOST,
      # SIP_USER_ROOT_DOMAIN, public_root_url, and app_base_url from this.
      PUBLIC_BASE_URL: https://${COMCENT_DOMAIN}
      PHX_SERVER: 'true'
      PORT: '4000'
      DATABASE_URL: postgres://${POSTGRES_USER:-comcent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-comcent}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-comcent}:${RABBITMQ_PASSWORD}@rabbitmq
      # In-tree Go SBC's pinned IP — dial_utils derives fs_path=sip:<IP>:5065
      # from this, FreeSWITCH ACL denies it (so SBC traffic is treated as
      # non-local and ext-rtp-ip is used in SDP), and kamailio_rpc.ex uses
      # http://<IP>/rpc for control-plane calls.
      SBC_IP: ${SBC_IP:-172.20.0.10}
      CLUSTER_STRATEGY: gossip
      POSTGRES_SSL_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    # Routing rules live in traefik-dynamic.yml (file provider) — see the
    # traefik service. Docker-provider labels are not used.
    healthcheck:
      test: ['CMD', 'curl', '--fail', '--silent', 'http://127.0.0.1:4000/health']
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - comcent-network

  # ---------------------------------------------------------------------------
  # Comcent web-app (SvelteKit SSR)
  # ---------------------------------------------------------------------------
  web-app:
    image: ghcr.io/comcent-io/comcent-ce-webapp:${COMCENT_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile-web-app
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: '3000'
      # SvelteKit derives PUBLIC_APP_BASE_URL and the SIP user-root domain
      # shown in the UI from PUBLIC_BASE_URL via $lib/publicConfig. ORIGIN is consumed by
      # adapter-node for url.origin behind Traefik. PUBLIC_SIP_WS_URL is
      # set explicitly because the SBC serves WSS on its own host port
      # (not 443 — Traefik holds that), so the default derivation would
      # land on the wrong port.
      PUBLIC_BASE_URL: https://${COMCENT_DOMAIN}
      ORIGIN: https://${COMCENT_DOMAIN}
      PUBLIC_SIP_WS_URL: wss://${COMCENT_DOMAIN}:${SIP_WSS_PORT:-5063}/sip-ws
      INTERNAL_API_BASE_URL: http://server:4000/internal-api
    depends_on:
      server:
        condition: service_healthy
    # Routing rules live in traefik-dynamic.yml (file provider).
    networks:
      - comcent-network

  # ---------------------------------------------------------------------------
  # Go SBC — SIP proxy / registrar / dispatcher (replaces Kamailio in CE)
  # Listens on 5060 UDP+TCP for SIP signaling and
  # serves SIP-over-WSS directly on host port ${SIP_WSS_PORT:-5063}.
  # SBC terminates TLS itself using the Let's Encrypt cert Traefik already
  # issued for ${COMCENT_DOMAIN} (extracted into a shared volume by the
  # cert-dumper sidecar). Going through Traefik would mask the browser's
  # source addr from sipgo and break BYE relay back to the WebRTC agent.
  # ---------------------------------------------------------------------------
  sbc:
    image: ghcr.io/comcent-io/comcent-ce-sbc:${COMCENT_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile-sbc
    restart: unless-stopped
    env_file: .env
    environment:
      INTERNAL_API_BASE_URL: http://server:4000/internal-api
      INTERNAL_API_USERNAME: ${INTERNAL_API_USERNAME:-internal_api}
      INTERNAL_API_PASSWORD: ${INTERNAL_API_PASSWORD}
      SIP_USER_ROOT_DOMAIN: ${COMCENT_DOMAIN}
      WSS_CERT_PATH: /certs/certs/${COMCENT_DOMAIN}.crt
      WSS_KEY_PATH: /certs/private/${COMCENT_DOMAIN}.key
      WSS_PORT: '5063'
    ports:
      - '5060:5060/udp'
      - '5060:5060/tcp'
      - '${SIP_WSS_PORT:-5063}:5063/tcp'
    volumes:
      - sbc_certs:/certs:ro
    depends_on:
      server:
        condition: service_healthy
      cert-dumper:
        condition: service_started
    # Pinned IP — server's SBC_IP env and FreeSWITCH ACL reference this.
    networks:
      comcent-network:
        ipv4_address: 172.20.0.10

  # ---------------------------------------------------------------------------
  # Cert dumper — watches Traefik's acme.json and writes per-domain PEM files
  # into a shared volume so the SBC can serve WSS with the same Let's Encrypt
  # cert Traefik issues for ${COMCENT_DOMAIN}. Re-runs on every acme.json
  # change (cert renewal); SBC re-reads the files every 5 minutes.
  # ---------------------------------------------------------------------------
  cert-dumper:
    image: ldez/traefik-certs-dumper:v2.11.2
    restart: unless-stopped
    entrypoint: sh
    command:
      - -c
      - |
        until [ -e /letsencrypt/acme.json ]; do
          echo "waiting for /letsencrypt/acme.json …"
          sleep 5
        done
        exec traefik-certs-dumper file \
          --version v2 \
          --watch \
          --source /letsencrypt/acme.json \
          --dest /certs
    volumes:
      - traefik_letsencrypt:/letsencrypt:ro
      - sbc_certs:/certs
    depends_on:
      traefik:
        condition: service_started
    networks:
      - comcent-network

  # ---------------------------------------------------------------------------
  # FreeSWITCH — media server for RTP. Not behind Traefik (raw RTP, not HTTP).
  # ---------------------------------------------------------------------------
  freeswitch:
    image: ghcr.io/comcent-io/freeswitch-ce:${FREESWITCH_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      EXTERNAL_SIP_IP: ${PUBLIC_IP}
      EXTERNAL_RTP_IP: ${PUBLIC_IP}
      RTP_START_PORT: '19000'
      RTP_END_PORT: '19100'
      INTERNAL_API_BASE_URL: http://server:4000/internal-api/xml-curl
      INTERNAL_API_USERNAME: ${INTERNAL_API_USERNAME:-internal_api}
      INTERNAL_API_PASSWORD: ${INTERNAL_API_PASSWORD}
      # FreeSWITCH image (separate repo) reads SIP_DOMAIN — kept under that name
      # for image compatibility. Same value as SIP_USER_ROOT_DOMAIN elsewhere.
      SIP_DOMAIN: ${COMCENT_DOMAIN}
    ports:
      - '19000-19100:19000-19100/udp'
    depends_on:
      server:
        condition: service_healthy
      sbc:
        condition: service_started
    # Pinned IP — referenced by FreeSWITCH ACL allow rules (FS_LOCAL_NETWORK)
    # and the SBC dispatcher's auto-discovery.
    networks:
      comcent-network:
        ipv4_address: 172.20.0.11

  # ---------------------------------------------------------------------------
  # Voice bot (AI) — OPTIONAL. Uncomment to enable real-time AI voice agent.
  # Needs DEEPGRAM_API_KEY and OPENAI_API_KEY in .env.
  # ---------------------------------------------------------------------------
  # voice-bot:
  #   image: ghcr.io/comcent-io/go-voice-bot-ce:${VOICE_BOT_VERSION:-latest}
  #   restart: unless-stopped
  #   env_file: .env
  #   environment:
  #     COMCENT_API_URL: http://server:4000
  #     SIP_USER_ROOT_DOMAIN: ${COMCENT_DOMAIN}
  #     SIP_REGISTER_URL: sip:sbc:5060
  #   depends_on:
  #     server:
  #       condition: service_healthy
  #   networks:
  #     - comcent-network

networks:
  comcent-network:
    name: comcent-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  traefik_letsencrypt:
  sbc_certs:

configs:
  # Traefik dynamic config — file provider. Replaces the docker provider,
  # which can't talk to modern Docker (its API client is hard-coded to v1.24
  # and Docker Engine ≥25 enforces ≥1.40). ${COMCENT_DOMAIN} is interpolated
  # by docker compose at config-write time, so the Host(...) rules match
  # the operator's domain without templating or sed.
  traefik-dynamic:
    content: |
      http:
        routers:
          comcent-api:
            rule: "Host(`${COMCENT_DOMAIN}`) && (PathPrefix(`/api/`) || PathPrefix(`/ws`) || PathPrefix(`/health`) || PathPrefix(`/internal-api`))"
            entryPoints: [websecure]
            service: comcent-api
            priority: 100
            tls:
              certResolver: letsencrypt
          comcent-webapp:
            rule: "Host(`${COMCENT_DOMAIN}`)"
            entryPoints: [websecure]
            service: comcent-webapp
            priority: 1
            tls:
              certResolver: letsencrypt
        services:
          comcent-api:
            loadBalancer:
              servers:
                - url: "http://server:4000"
          comcent-webapp:
            loadBalancer:
              servers:
                - url: "http://web-app:3000"
