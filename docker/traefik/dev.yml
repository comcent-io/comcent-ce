http:
  routers:
    comcent-api:
      entryPoints:
        - web
      rule: PathPrefix(`/api/v2`) || PathPrefix(`/ws`) || PathPrefix(`/health`) || PathPrefix(`/internal-api`)
      service: comcent-api
      priority: 100

    # SIP over WebSocket — browser dialer connects here, SBC upgrades to WS.
    comcent-sip-ws:
      entryPoints:
        - web
      rule: PathPrefix(`/sip-ws`)
      service: comcent-sip-ws
      priority: 200

    comcent-webapp:
      entryPoints:
        - web
      rule: PathPrefix(`/`)
      service: comcent-webapp
      priority: 1

  services:
    comcent-api:
      loadBalancer:
        servers:
          - url: http://server:4000

    comcent-sip-ws:
      loadBalancer:
        servers:
          - url: http://sbc:80

    comcent-webapp:
      loadBalancer:
        servers:
          - url: http://web-app:5174
