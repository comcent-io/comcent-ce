http:
  routers:
    comcent-api:
      entryPoints:
        - web
      rule: PathPrefix(`/api/v2`) || PathPrefix(`/ws`) || PathPrefix(`/health`) || PathPrefix(`/internal-api`)
      service: comcent-api
      priority: 100

    comcent-webapp:
      entryPoints:
        - web
      rule: PathPrefix(`/`)
      service: comcent-webapp
      priority: 1

  # SIP-over-WS is NOT proxied through Traefik. The browser dialer connects
  # directly to the SBC on its own host port (ws://localhost:6080/sip-ws in dev,
  # wss://${COMCENT_DOMAIN}:5063/sip-ws in prod). Going via Traefik confuses
  # sipgo's WebSocket connection-pool keying so server-initiated requests
  # (BYE from FreeSWITCH→agent) fail to reuse the inbound connection.

  services:
    comcent-api:
      loadBalancer:
        servers:
          - url: http://server:4000

    comcent-webapp:
      loadBalancer:
        servers:
          - url: http://web-app:5174
